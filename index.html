<!doctype html>
<html lang="en" data-theme="redpash" data-mode="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>amenan-ui — showcase</title>

    <!-- Pre-paint theme snippet (AC-B3): read amu-theme + amu-mode (with the
         legacy "dark"/"light" → mode migration) and set BOTH data-theme +
         data-mode BEFORE first paint to prevent a flash of the default theme.
         Kept byte-equal to theme.ts `prePaintSnippet`. -->
    <script>
      (function(){try{var t=localStorage.getItem("amu-theme");var m=localStorage.getItem("amu-mode");var d=document.documentElement;var isMode=function(v){return v==="dark"||v==="light";};if(!isMode(m)){m=isMode(t)?t:"dark";}var theme=(t&&!isMode(t))?t:"redpash";d.setAttribute("data-theme",theme);d.setAttribute("data-mode",m);}catch(e){}})();
    </script>

    <!-- Vendored static assets (AC-A7): icons + echarts. Not npm deps. -->
    <link rel="stylesheet" href="vendor/bootstrap-icons/bootstrap-icons.css" />
    <!-- Theme tokens + flattened component CSS. In dev this is the @import
         manifest; the build emits dist/tokens.css. -->
    <link rel="stylesheet" href="styles.css" />
    <!-- Gallery-only chrome for the showcase (not shipped in dist/tokens.css). -->
    <link rel="stylesheet" href="showcase.css" />
    <!-- Vendored echarts (AC-A7) so the chart showcase renders a real chart. -->
    <script defer src="vendor/echarts/echarts.min.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <!-- The showcase entry (built to dist/showcase.js in W6). -->
    <script type="module" src="dist/showcase.js"></script>
  </body>
</html>
